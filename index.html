<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Website</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#gallery">Gallery</a></li>
            </ul>
        </nav>
    </header>

    <!-- Home Section -->
    <section id="home" class="visible">
        <div class="content-block">
            <div class="text-container">
                <h1>Welcome to My Site</h1>
                <div class="intro-text">
                    <p>Insert your main introductory text here</p>
                </div>
            </div>
        </div>
    </section>

    <!-- About Section -->
    <section id="about">
        <div class="content-block">
            <div class="text-column">
                <h2>About Us</h2>
                <div class="body-text">
                    <p>Insert your about content here</p>
                    <p>More detailed information text</p>
                </div>
            </div>
            <div class="image-column">
                <!-- Insert about section image here -->
                <img src="placeholder-about.jpg" alt="About section visual" class="loaded">
            </div>
        </div>
    </section>

    <!-- Gallery Section -->
    <section id="gallery">
        <div class="content-block">
            <h2>Gallery</h2>
            <div class="galeria">
                <img src="image1.jpg" alt="Gallery item 1" class="loaded">
                <img src="image2.jpg" alt="Gallery item 2" class="loaded">
                <img src="image3.jpg" alt="Gallery item 3" class="loaded">
            </div>
        </div>
    </section>

    <script>
        // Simple scroll reveal animation
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if(entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('section').forEach((section) => {
            observer.observe(section);
        });
    </script>
</body>
</html>
